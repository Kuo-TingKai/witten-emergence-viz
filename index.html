<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>It from Bit · 代數結構中湧現的時空</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
<link rel="stylesheet" href="assets/style.css" />
<link rel="stylesheet" href="assets/gs-theme.css" />
<link rel="stylesheet" href="assets/modes.css" />
<link rel="stylesheet" href="assets/showcase.css" />
<link rel="stylesheet" href="assets/spirit.css" />
<link rel="stylesheet" href="assets/responsive.css" />
</head>
<body>

<!-- background canvas -->
<canvas id="bg-field"></canvas>

<!-- progress bar -->
<div id="progress"></div>

<!-- ===================== HERO ===================== -->
<header class="hero">
  <div class="hero-inner reveal">
    <div class="eyebrow" data-i18n="hero.eyebrow"></div>
    <h1 data-i18n="hero.h1"></h1>
    <p class="lede" data-i18n="hero.lede"></p>
    <div class="hero-eq" data-i18n="hero.eq"></div>
    <a class="scroll-cue" href="#start" data-i18n="ui.scrollCue"></a>
  </div>
</header>

<main>

<!-- ===================== 一、起點 ===================== -->
<section id="start" class="step">
  <div class="step-num reveal">01</div>
  <h2 class="reveal" data-i18n="s01.h2"></h2>
  <div class="grid-2">
    <div class="reveal" data-i18n="s01.left"></div>
    <aside class="card warn reveal" data-i18n="s01.aside"></aside>
  </div>
</section>

<!-- ===================== 過渡動畫 ===================== -->
<section class="step transition-stage">
  <div class="step-num reveal">02</div>
  <h2 class="reveal" data-i18n="s02.h2"></h2>
  <p class="reveal center-lede" data-i18n="s02.lede"></p>
  <div class="flow reveal" data-i18n="s02.flow"></div>
  <div class="card hl reveal" data-i18n="s02.hl"></div>
</section>

<!-- ===================== 三、湧現卡片 ===================== -->
<section class="step">
  <div class="step-num reveal">03</div>
  <h2 class="reveal" data-i18n="s03.h2"></h2>
  <div class="cards reveal">
    <article class="emerge" data-k="time">
      <div class="ehead"><span class="ico"><i data-lucide="hourglass"></i></span><h3 data-i18n="card.time.title"></h3></div>
      <div class="ebody" data-i18n="card.time.body"></div>
    </article>
    <article class="emerge" data-k="space">
      <div class="ehead"><span class="ico"><i data-lucide="globe"></i></span><h3 data-i18n="card.space.title"></h3></div>
      <div class="ebody" data-i18n="card.space.body"></div>
    </article>
    <article class="emerge" data-k="heat">
      <div class="ehead"><span class="ico"><i data-lucide="flame"></i></span><h3 data-i18n="card.heat.title"></h3></div>
      <div class="ebody" data-i18n="card.heat.body"></div>
    </article>
    <article class="emerge" data-k="energy">
      <div class="ehead"><span class="ico"><i data-lucide="zap"></i></span><h3 data-i18n="card.energy.title"></h3></div>
      <div class="ebody" data-i18n="card.energy.body"></div>
    </article>
    <article class="emerge wide" data-k="mass">
      <div class="ehead"><span class="ico"><i data-lucide="target"></i></span><h3 data-i18n="card.mass.title"></h3></div>
      <div class="ebody" data-i18n="card.mass.body"></div>
    </article>
  </div>
</section>

<!-- ===================== 全像 QEC 階梯 ===================== -->
<section class="step">
  <div class="step-num reveal">04</div>
  <h2 class="reveal" data-i18n="s04.h2"></h2>
  <p class="reveal center-lede" data-i18n="s04.lede"></p>
  <div class="qec-ladder reveal" data-i18n="s04.ladder"></div>
  <div class="cards reveal">
    <article class="emerge" data-k="rt">
      <div class="ehead"><span class="ico"><i data-lucide="spline"></i></span><h3 data-i18n="card.rt.title"></h3></div>
      <div class="ebody" data-i18n="card.rt.body"></div>
    </article>
    <article class="emerge" data-k="jlms">
      <div class="ehead"><span class="ico"><i data-lucide="shield"></i></span><h3 data-i18n="card.jlms.title"></h3></div>
      <div class="ebody" data-i18n="card.jlms.body"></div>
    </article>
    <article class="emerge wide" data-k="tqft">
      <div class="ehead"><span class="ico"><i data-lucide="infinity"></i></span><h3 data-i18n="card.tqft.title"></h3></div>
      <div class="ebody" data-i18n="card.tqft.body"></div>
    </article>
    <article class="emerge todo" data-k="happy">
      <div class="ehead"><span class="ico"><i data-lucide="hexagon"></i></span><h3 data-i18n="card.happy.title"></h3></div>
      <div class="ebody" data-i18n="card.happy.body"></div>
    </article>
    <article class="emerge todo" data-k="cs">
      <div class="ehead"><span class="ico"><i data-lucide="waves"></i></span><h3 data-i18n="card.cs.title"></h3></div>
      <div class="ebody" data-i18n="card.cs.body"></div>
    </article>
  </div>
</section>

<!-- ===================== 總結表 ===================== -->
<section class="step">
  <div class="step-num reveal">05</div>
  <h2 class="reveal" data-i18n="s05.h2"></h2>
  <table class="summary reveal" data-i18n="s05.table"></table>
  <p class="closing reveal" data-i18n="s05.closing"></p>
</section>

<!-- ===================== 參考文獻 ===================== -->
<section class="step refs">
  <h2 class="reveal" data-i18n="ui.refsTitle"></h2>
  <ol class="reveal" id="reflist"></ol>
</section>

</main>

<footer>
  <p data-i18n="ui.footer"></p>
</footer>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="assets/refs.js"></script>
<!-- 預設語言（同時作為 fallback）先載入，避免首屏空白 -->
<script src="assets/i18n/zh-Hant.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/details.js"></script>
<script src="assets/showcase.js"></script>
<script src="assets/spirit.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
